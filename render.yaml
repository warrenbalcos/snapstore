services:
  - type: web
    name: snapstore
    runtime: docker
    repo: https://github.com/warrenbalcos/snapstore
    branch: master
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: SESSION_DRIVER
        value: array
      - key: CACHE_STORE
        value: array
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: snapstore-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: snapstore-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: snapstore-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: snapstore-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: snapstore-db
          property: password

databases:
  - name: snapstore-db
    plan: free
