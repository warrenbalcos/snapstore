services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=snapstore
      - DB_USERNAME=snapstore
      - DB_PASSWORD=secret

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: snapstore
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: snapstore
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snapstore"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:
