name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: snapstore
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: snapstore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U snapstore"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: xdebug
          extensions: pdo_pgsql

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run migrations
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: snapstore_test
          DB_USERNAME: snapstore
          DB_PASSWORD: secret
        run: php artisan migrate --force

      - name: Run tests with coverage
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: snapstore_test
          DB_USERNAME: snapstore
          DB_PASSWORD: secret
          XDEBUG_MODE: coverage
        run: vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml

      - name: Enforce coverage threshold (80%)
        run: |
          COVERAGE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          metrics = tree.getroot().find('.//project/metrics')
          covered = int(metrics.get('coveredstatements'))
          total = int(metrics.get('statements'))
          print(f'{(covered/total)*100:.0f}' if total > 0 else '0')
          ")
          echo "Line coverage: ${COVERAGE}%"
          if [ "$COVERAGE" -lt 80 ]; then
            echo "::error::Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi
          echo "Coverage check passed: ${COVERAGE}%"
